name: obsctl-rs fixture compatibility

on:
  pull_request:
  push:

jobs:
  compatibility:
    runs-on: ubuntu-latest
    steps:
      - name: Check out obsctl
        uses: actions/checkout@v4
        with:
          path: obsctl

      - name: Check out obsctl-rs
        uses: actions/checkout@v4
        with:
          repository: w0rxbend/obsctl-rs
          path: obsctl-rs

      - name: Install Crystal
        uses: crystal-lang/install-crystal@v1

      - name: Compare obsctl-rs fixtures
        working-directory: obsctl
        env:
          CRYSTAL_CACHE_DIR: /tmp/obsctl-crystal-cache
        run: |
          test -d ../obsctl-rs
          make contract-rs-compat
